<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Telegram Viral Sticker Pack </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

.navbar{
    background:#4c6f8f;
    color:white;
    padding:15px 30px;
    font-size:22px;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:30px 0;
}

h1{
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

.search{
    width:100%;
    padding:15px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:30px;
    font-size:16px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    padding:15px;
}

.btn{
    display:block;
    background:#0088cc;
    color:white;
    text-decoration:none;
    text-align:center;
    padding:12px;
}

.btn:hover{
    background:#0077b3;
}
</style>
</head>

<body>

<div class="navbar">
    Telegram Sticker Directory
</div>

<div class="container">

    <h1>Popular Stickers</h1>
    <p class="subtitle">Discover cool Telegram sticker packs.</p>

    <input type="text" class="search" placeholder="Search stickers...">

    <div class="grid">

        <div class="card">
            <img src="https://placehold.co/300x300" alt="">
            <h3>Love Stickers</h3>
            <a href="#" class="btn">View Pack</a>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x300" alt="">
            <h3>Funny Stickers</h3>
            <a href="#" class="btn">View Pack</a>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x300" alt="">
            <h3>Anime Stickers</h3>
            <a href="#" class="btn">View Pack</a>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x300" alt="">
            <h3>Meme Stickers</h3>
            <a href="#" class="btn">View Pack</a>
        </div>

    </div>

</div>

</body>
</html>
