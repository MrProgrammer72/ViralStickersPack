<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Vibes 💗✨</title>
<style>

/* ─── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

:root {
  --pink:     #ff4d88;
  --pink-glow: rgba(255,77,136,0.45);
  --pink-soft: rgba(255,77,136,0.18);
  --white10:  rgba(255,255,255,0.10);
  --white15:  rgba(255,255,255,0.15);
  --white20:  rgba(255,255,255,0.20);
  --white30:  rgba(255,255,255,0.30);
  --white60:  rgba(255,255,255,0.60);
  --edge:     rgba(255,255,255,0.35);
  --shadow:   rgba(0,0,0,0.30);
  --blur-sm:  blur(16px);
  --blur-md:  blur(28px);
  --blur-lg:  blur(44px);
  --radius-pill: 999px;
  --radius-card: 28px;
  --radius-btn:  50px;
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --ease:   cubic-bezier(0.25,0.46,0.45,0.94);
}

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  background: #0a0a0f;
  color: #fff;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ─── AMBIENT BACKGROUND ORBS ─────────────────────────────── */
.orbs {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.5;
  animation: orbFloat 12s ease-in-out infinite;
}
.orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #ff4d88, #c2185b); top: -100px; left: -100px; animation-delay: 0s; }
.orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #7c3aed, #4c1d95); top: 30%; right: -80px; animation-delay: 4s; }
.orb-3 { width: 350px; height: 350px; background: radial-gradient(circle, #ec4899, #9d174d); bottom: 10%; left: 20%; animation-delay: 7s; }

@keyframes orbFloat {
  0%, 100% { transform: translate(0,0) scale(1); }
  33%       { transform: translate(30px,-40px) scale(1.05); }
  66%       { transform: translate(-20px,25px) scale(0.97); }
}

/* ─── LIQUID GLASS MIXIN CLASSES ───────────────────────────── */
.glass {
  background:
    linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.12) 100%);
  backdrop-filter: blur(44px) saturate(180%) brightness(1.05);
  -webkit-backdrop-filter: blur(44px) saturate(180%) brightness(1.05);
  border: 1px solid rgba(255,255,255,0.22);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.40),
    inset 0 -1px 0 rgba(0,0,0,0.12),
    inset 1px 0 0 rgba(255,255,255,0.20),
    inset -1px 0 0 rgba(255,255,255,0.10),
    0 8px 32px rgba(0,0,0,0.28),
    0 2px 8px rgba(0,0,0,0.18),
    0 0 0 0.5px rgba(255,255,255,0.12);
}

/* ─── HEADER / NAVBAR ───────────────────────────────────────── */
header {
  position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.04) 60%, rgba(255,255,255,0.10) 100%);
  backdrop-filter: blur(44px) saturate(200%) brightness(1.08);
  -webkit-backdrop-filter: blur(44px) saturate(200%) brightness(1.08);
  border-bottom: 1px solid rgba(255,255,255,0.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.36),
    0 4px 24px rgba(0,0,0,0.22),
    0 1px 0 rgba(255,255,255,0.08);
}

.logo {
  display: flex; align-items: center; gap: 12px;
  text-decoration: none;
}
.logo img {
  width: 48px; height: 48px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.30);
  box-shadow: 0 0 12px var(--pink-glow), 0 0 0 1px var(--pink-soft);
  object-fit: cover;
}
.logo h2 { color: var(--pink); font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }

/* ─── DESKTOP NAV ───────────────────────────────────────────── */
nav { display: flex; gap: 10px; }

nav a {
  text-decoration: none; color: rgba(255,255,255,0.88);
  font-size: 14px; font-weight: 500;
  padding: 9px 20px;
  border-radius: var(--radius-pill);
  background:
    linear-gradient(135deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.04) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.20);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.30),
    0 2px 8px rgba(0,0,0,0.18);
  transition: all 0.4s var(--spring);
  position: relative; overflow: hidden;
}
nav a::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,77,136,0.25) 0%, rgba(255,77,136,0.05) 100%);
  opacity: 0; border-radius: inherit;
  transition: opacity 0.35s var(--ease);
}
nav a:hover {
  color: #fff;
  border-color: rgba(255,77,136,0.45);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.40),
    0 0 18px var(--pink-glow),
    0 4px 16px rgba(0,0,0,0.22);
  transform: translateY(-1px);
}
nav a:hover::before { opacity: 1; }

/* ─── HAMBURGER ─────────────────────────────────────────────── */
.menu-btn {
  display: none;
  width: 44px; height: 44px; border-radius: 50%;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.06) 100%);
  border: 1px solid rgba(255,255,255,0.24);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.36), 0 4px 16px rgba(0,0,0,0.25);
  cursor: pointer; align-items: center; justify-content: center; flex-direction: column; gap: 5px;
  transition: all 0.35s var(--spring);
}
.menu-btn span {
  display: block; width: 20px; height: 2px; border-radius: 2px;
  background: rgba(255,255,255,0.85);
  transition: all 0.35s var(--spring);
  transform-origin: center;
}
.menu-btn:hover {
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.40), 0 0 16px var(--pink-glow), 0 4px 16px rgba(0,0,0,0.30);
  border-color: rgba(255,77,136,0.40);
}
.menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.menu-btn.open span:nth-child(2) { transform: scaleX(0); opacity: 0; }
.menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ─── MOBILE NAV OVERLAY ────────────────────────────────────── */
.mobile-nav {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s var(--ease);
}
.mobile-nav.open { opacity: 1; pointer-events: all; }
.mobile-nav-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.38);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.mobile-nav-pills {
  position: absolute;
  top: 90px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  width: calc(100% - 48px); max-width: 340px;
}
.mobile-nav-pills a {
  display: block; width: 100%;
  text-align: center;
  text-decoration: none; color: rgba(255,255,255,0.90);
  font-size: 16px; font-weight: 600; letter-spacing: 0.1px;
  padding: 16px 28px;
  border-radius: var(--radius-pill);
  background:
    linear-gradient(135deg, rgba(255,255,255,0.20) 0%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.14) 100%);
  backdrop-filter: blur(44px) saturate(180%);
  -webkit-backdrop-filter: blur(44px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.28);
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.42),
    inset 0 -1px 0 rgba(0,0,0,0.10),
    0 8px 28px rgba(0,0,0,0.30);
  transform: translateY(24px) scale(0.95);
  opacity: 0;
  transition: transform 0.5s var(--spring), opacity 0.4s var(--ease), box-shadow 0.3s var(--ease);
}
.mobile-nav.open .mobile-nav-pills a {
  transform: translateY(0) scale(1); opacity: 1;
}
.mobile-nav.open .mobile-nav-pills a:nth-child(1) { transition-delay: 0.05s; }
.mobile-nav.open .mobile-nav-pills a:nth-child(2) { transition-delay: 0.12s; }
.mobile-nav.open .mobile-nav-pills a:nth-child(3) { transition-delay: 0.19s; }
.mobile-nav-pills a:hover {
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.50),
    0 0 22px var(--pink-glow), 0 8px 28px rgba(0,0,0,0.30);
  background:
    linear-gradient(135deg, rgba(255,77,136,0.28) 0%, rgba(255,77,136,0.08) 50%, rgba(255,77,136,0.20) 100%);
  border-color: rgba(255,77,136,0.40);
}

/* ─── HERO ──────────────────────────────────────────────────── */
.hero {
  height: 100vh; position: relative; overflow: hidden;
}
.slide {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  opacity: 0; transition: opacity 2.5s var(--ease);
}
.slide.active { opacity: 1; }

.hero-glass {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom,
    rgba(0,0,0,0.18) 0%,
    rgba(0,0,0,0.10) 40%,
    rgba(10,10,15,0.72) 100%);
  backdrop-filter: blur(1px);
}

.hero-content {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center; z-index: 5; width: 90%;
}
.hero-pill {
  display: inline-block;
  padding: 7px 18px; margin-bottom: 20px;
  border-radius: var(--radius-pill);
  background:
    linear-gradient(135deg, rgba(255,77,136,0.30) 0%, rgba(255,77,136,0.10) 100%);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,77,136,0.40);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.30), 0 4px 16px rgba(255,77,136,0.25);
  font-size: 13px; font-weight: 600; letter-spacing: 0.8px; color: #ffb3cc;
  text-transform: uppercase;
}
.hero-content h1 {
  font-size: clamp(42px, 8vw, 80px);
  font-weight: 800; letter-spacing: -2px; line-height: 1.0;
  background: linear-gradient(135deg, #fff 0%, #ffb3cc 50%, #ff4d88 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 30px rgba(255,77,136,0.50));
  margin-bottom: 18px;
}
.hero-content p {
  font-size: clamp(16px, 2.5vw, 22px);
  color: rgba(255,255,255,0.75); letter-spacing: 0.1px;
  font-weight: 400;
}
.hero-cta {
  display: inline-block; margin-top: 32px;
  padding: 14px 32px; border-radius: var(--radius-pill);
  text-decoration: none; color: #fff; font-size: 15px; font-weight: 700;
  background:
    linear-gradient(135deg, rgba(255,77,136,0.70) 0%, rgba(220,38,127,0.80) 100%);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,150,185,0.40);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.35),
    0 0 28px rgba(255,77,136,0.50),
    0 8px 24px rgba(0,0,0,0.30);
  transition: all 0.4s var(--spring);
}
.hero-cta:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.45),
    0 0 44px rgba(255,77,136,0.70),
    0 12px 32px rgba(0,0,0,0.35);
}

/* ─── SECTION TITLE ─────────────────────────────────────────── */
.section-title {
  text-align: center; padding: 80px 20px 10px;
  font-size: clamp(26px, 5vw, 42px); font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 30%, #ff4d88 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.section-sub {
  text-align: center; color: rgba(255,255,255,0.45); font-size: 15px;
  padding-bottom: 40px; letter-spacing: 0.3px;
}

/* ─── CARDS GRID ────────────────────────────────────────────── */
.container { max-width: 1200px; margin: auto; padding: 0 24px 80px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.card {
  border-radius: var(--radius-card);
  overflow: hidden;
  position: relative;
  background:
    linear-gradient(145deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0.10) 100%);
  backdrop-filter: blur(44px) saturate(160%) brightness(1.03);
  -webkit-backdrop-filter: blur(44px) saturate(160%) brightness(1.03);
  border: 1px solid rgba(255,255,255,0.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.35),
    inset 0 -1px 0 rgba(0,0,0,0.10),
    inset 1px 0 0 rgba(255,255,255,0.18),
    0 8px 32px rgba(0,0,0,0.30),
    0 2px 8px rgba(0,0,0,0.20);
  transition: transform 0.5s var(--spring), box-shadow 0.5s var(--ease);
}

/* top-edge highlight bar */
.card::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%;
  height: 1px; border-radius: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
  z-index: 2;
}
/* subtle pink inner glow on hover */
.card::after {
  content: '';
  position: absolute; inset: 0; border-radius: var(--radius-card);
  background: radial-gradient(ellipse at 50% 0%, rgba(255,77,136,0.18) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.4s var(--ease);
  pointer-events: none; z-index: 1;
}
.card:hover { transform: translateY(-10px) scale(1.01); }
.card:hover::after { opacity: 1; }
.card:hover {
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.45),
    inset 0 -1px 0 rgba(0,0,0,0.10),
    0 0 0 1px rgba(255,77,136,0.30),
    0 20px 56px rgba(0,0,0,0.40),
    0 0 40px rgba(255,77,136,0.25);
}

.card img, .card video {
  width: 100%; height: 240px; object-fit: cover; display: block;
}

.card-body {
  padding: 20px 20px 24px; position: relative; z-index: 3;
}
.card-body h3 {
  font-size: 16px; font-weight: 700; margin-bottom: 14px;
  color: rgba(255,255,255,0.92);
}

/* ─── BUTTONS ───────────────────────────────────────────────── */
.btn {
  display: inline-block;
  padding: 11px 26px; border-radius: var(--radius-btn);
  text-decoration: none; color: #fff; font-size: 14px; font-weight: 700;
  background:
    linear-gradient(135deg, rgba(255,77,136,0.65) 0%, rgba(220,38,127,0.75) 100%);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,150,185,0.35);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.32),
    0 0 18px rgba(255,77,136,0.35),
    0 4px 14px rgba(0,0,0,0.25);
  transition: all 0.4s var(--spring);
  letter-spacing: 0.1px;
}
.btn:hover {
  transform: translateY(-2px) scale(1.04);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.45),
    0 0 32px rgba(255,77,136,0.60),
    0 8px 22px rgba(0,0,0,0.30);
}

/* ─── CONTACT SECTION ───────────────────────────────────────── */
.contact { padding: 0 20px 100px; }

.contact-card {
  max-width: 460px; margin: auto;
  border-radius: 36px;
  padding: 44px 40px;
  text-align: center;
  position: relative; overflow: hidden;
  background:
    linear-gradient(145deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.12) 100%);
  backdrop-filter: blur(44px) saturate(180%) brightness(1.05);
  -webkit-backdrop-filter: blur(44px) saturate(180%) brightness(1.05);
  border: 1px solid rgba(255,255,255,0.22);
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.42),
    inset 0 -1px 0 rgba(0,0,0,0.12),
    inset 1.5px 0 0 rgba(255,255,255,0.20),
    inset -1.5px 0 0 rgba(255,255,255,0.10),
    0 24px 64px rgba(0,0,0,0.40),
    0 0 0 1px rgba(255,255,255,0.06);
}
.contact-card::before {
  content: '';
  position: absolute; top: 0; left: 15%; right: 15%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.60), transparent);
}
.contact-card::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% -10%, rgba(255,77,136,0.22) 0%, transparent 65%);
  pointer-events: none;
}

.contact-avatar {
  position: relative; display: inline-block; margin-bottom: 18px; z-index: 2;
}
.contact-avatar img {
  width: 110px; height: 110px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.25);
  object-fit: cover;
  box-shadow:
    0 0 0 1px rgba(255,77,136,0.40),
    0 0 30px rgba(255,77,136,0.45),
    0 8px 24px rgba(0,0,0,0.35);
}
.avatar-ring {
  position: absolute; inset: -6px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.20);
  animation: spinRing 8s linear infinite;
}
.avatar-ring::after {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--pink);
  box-shadow: 0 0 10px var(--pink), 0 0 20px var(--pink-glow);
}
@keyframes spinRing { to { transform: rotate(360deg); } }

.contact-card h2 {
  font-size: 24px; font-weight: 800; color: #fff;
  letter-spacing: -0.5px; position: relative; z-index: 2;
}
.contact-card .role {
  font-size: 13px; color: rgba(255,255,255,0.50); margin-top: 4px; margin-bottom: 24px;
  font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
  position: relative; z-index: 2;
}

.telegram-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 28px; border-radius: var(--radius-pill);
  text-decoration: none; color: #fff; font-size: 15px; font-weight: 700;
  background:
    linear-gradient(135deg, rgba(0,136,204,0.70) 0%, rgba(0,100,170,0.80) 100%);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(100,200,255,0.30);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.30),
    0 0 22px rgba(0,136,204,0.45),
    0 6px 18px rgba(0,0,0,0.28);
  transition: all 0.4s var(--spring);
  position: relative; z-index: 2;
}
.telegram-btn:hover {
  transform: translateY(-2px) scale(1.04);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.40),
    0 0 36px rgba(0,136,204,0.65),
    0 10px 26px rgba(0,0,0,0.32);
}
.telegram-icon {
  width: 18px; height: 18px;
  background: rgba(255,255,255,0.20); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}

.contact-desc {
  margin-top: 20px; margin-bottom: 20px;
  color: rgba(255,255,255,0.60); font-size: 14px; line-height: 1.6;
  position: relative; z-index: 2;
}
.contact-card .btn { position: relative; z-index: 2; }

/* ─── DIVIDER ───────────────────────────────────────────────── */
.divider {
  max-width: 1200px; margin: 0 auto;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
}

/* ─── FOOTER ────────────────────────────────────────────────── */
footer {
  text-align: center; padding: 28px;
  font-size: 13px; color: rgba(255,255,255,0.35);
  border-top: 1px solid rgba(255,255,255,0.07);
}

/* ─── FLOATING SCROLL INDICATOR ─────────────────────────────── */
.scroll-hint {
  position: absolute; bottom: 38px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 8px;
  animation: bobFloat 2.5s ease-in-out infinite;
}
.scroll-pill {
  width: 28px; height: 44px; border-radius: 14px;
  border: 1.5px solid rgba(255,255,255,0.35);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 7px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.04) 100%);
  backdrop-filter: blur(20px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.30);
}
.scroll-dot {
  width: 4px; height: 10px; border-radius: 2px;
  background: rgba(255,255,255,0.70);
  animation: scrollDot 2.5s ease-in-out infinite;
}
@keyframes scrollDot {
  0%, 100% { transform: translateY(0); opacity: 1; }
  80%       { transform: translateY(10px); opacity: 0.2; }
}
@keyframes bobFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%       { transform: translateX(-50%) translateY(6px); }
}

/* ─── RESPONSIVE ────────────────────────────────────────────── */
@media (max-width: 768px) {
  .menu-btn { display: flex; }
  nav { display: none; }
  .mobile-nav { display: block; }
  header { padding: 12px 20px; }
